services:
  apollo-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        CODEARTIFACT_ENDPOINT: ${CODEARTIFACT_ENDPOINT}
        CODEARTIFACT_AUTH_TOKEN: ${CODEARTIFACT_AUTH_TOKEN}
    image: apollo-service:dev
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev

      #OTEL
      OTLP_ENABLED: "true"
      OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
      OTEL_SERVICE_NAME: "apollo-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.name=apollo-service"

      #SQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://apollo-postgres:5432/apollo
      SPRING_DATASOURCE_USERNAME: apollo_user
      SPRING_DATASOURCE_PASSWORD: apollo_password

    networks: [internal]
    depends_on:
      - otel-collector
      - apollo-postgres

  apollo-postgres:
    image: postgres:17
    container_name: apollo-postgres
    environment:
      POSTGRES_DB: apollo
      POSTGRES_USER: apollo_user
      POSTGRES_PASSWORD: apollo_password
    ports:
      - "5432:5432"
    volumes:
      - apollo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U apollo_user -d apollo' ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    networks: [internal]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [internal]
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
    networks: [internal]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./docker/otel/otel-collector.yml:/etc/otelcol/config.yml:ro
    command: ["--config=/etc/otelcol/config.yml"]
    networks: [internal]
    depends_on:
      - jaeger

# make sure to run: docker network create platform
networks:
  internal:
    driver: bridge #Containers on the same bridge can resolve each other by service name.

volumes:
  grafana-data:
  apollo-postgres-data:
