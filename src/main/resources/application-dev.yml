spring:
  config:
    activate:
      on-profile: dev

  flyway:
    clean-disabled: true

management:
  prometheus:
    metrics:
      export:
        enabled: true
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
  tracing:
    export:
      otlp:
        enabled: ${OTLP_ENABLED:false} #enable exporting SPANS

debug: true
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG